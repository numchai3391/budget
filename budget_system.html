<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบพิมพ์รายละเอียดการเบิกงบประมาณ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .academic-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .input-field { @apply border border-gray-300 rounded-md p-2 w-full focus:ring-2 focus:ring-blue-400 focus:outline-none transition; }
        
        /* Remove arrows/spinners from number inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white p-6 md:p-10 rounded-xl academic-shadow">
        <header class="text-center mb-8 border-b pb-4">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-900">รายละเอียดการเบิกงบประมาณ</h1>
            <p class="text-gray-600 mt-2">กรอกข้อมูลรายการเบิกจ่าย เพื่อสร้างเอกสาร</p>
        </header>

        <!-- คำชี้แจง -->
        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-lg shadow-sm">
            <p class="text-blue-800 font-medium">⚠️ คำชี้แจง: เอกสารนี้ใช้สำหรับแนบ ป01 กรณีที่ได้เปลี่ยนงบประมาณ ป02 มาแล้ว</p>
        </div>

        <div id="notify" class="hidden fixed top-4 right-4 bg-green-500 text-white p-4 rounded-lg shadow-lg z-50"></div>

        <div id="form-container" class="space-y-6">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-200" id="budgetTable">
                    <thead>
                        <tr class="bg-blue-50 text-blue-900">
                            <th class="border p-2 w-16">ที่</th>
                            <th class="border p-2">รายการ</th>
                            <th class="border p-2 w-32">ราคา/หน่วย</th>
                            <th class="border p-2 w-32">จำนวน</th>
                            <th class="border p-2 w-32">รวมเป็นเงิน</th>
                            <th class="border p-2 w-16">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot id="tableFooter">
                        <tr class="bg-gray-100">
                            <td colspan="4" class="border p-2 text-right font-bold">รวมเป็นเงินทั้งสิ้น</td>
                            <td class="border p-2 text-right font-bold" id="finalSum">0.00</td>
                            <td class="border p-2"></td>
                        </tr>
                    </tfoot>
                </table>
                <button onclick="addRow()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">+ เพิ่มรายการ</button>
            </div>

            <div class="border-t pt-6 mt-6">
                <h3 class="font-semibold text-lg mb-4 text-blue-900">ข้อมูลคณะกรรมการ</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="com1" placeholder="ชื่อประธานกรรมการ" class="input-field" required>
                    <input type="text" id="com2" placeholder="ชื่อกรรมการ" class="input-field" required>
                    <input type="text" id="com3" placeholder="ชื่อกรรมการ" class="input-field" required>
                </div>
            </div>

            <div class="text-center pt-6 flex gap-4 justify-center">
                <button onclick="saveData()" class="bg-gray-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-gray-700 transition shadow-lg">
                    บันทึกข้อมูล
                </button>
                <button onclick="exportToWord()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-green-700 transition shadow-lg">
                    ดาวน์โหลดไฟล์ Word
                </button>
            </div>
        </div>
    </div>

    <script>
        let rowCount = 0;

        window.onload = () => {
            const savedData = localStorage.getItem('budgetData');
            if (savedData) {
                const data = JSON.parse(savedData);
                data.rows.forEach(item => addRow(item));
                document.getElementById('com1').value = data.com1 || '';
                document.getElementById('com2').value = data.com2 || '';
                document.getElementById('com3').value = data.com3 || '';
            } else {
                addRow();
            }
        };

        function addRow(data = {}) {
            rowCount++;
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="border p-2 text-center row-index">${rowCount}</td>
                <td class="border p-2"><input type="text" class="input-field item-desc" value="${data.desc || ''}" placeholder="ระบุรายการ..."></td>
                <td class="border p-2"><input type="number" class="input-field unit-price" value="${data.price || ''}" oninput="calculate()" placeholder="0.00"></td>
                <td class="border p-2"><input type="number" class="input-field quantity" value="${data.qty || ''}" oninput="calculate()" placeholder="0"></td>
                <td class="border p-2 text-right font-bold total-row">0.00</td>
                <td class="border p-2 text-center"><button onclick="removeRow(this)" class="text-red-500 hover:text-red-700">ลบ</button></td>
            `;
            tbody.appendChild(row);
            calculate();
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
            reindexRows();
            calculate();
        }

        function reindexRows() {
            const rows = document.querySelectorAll('#tableBody tr');
            rowCount = 0;
            rows.forEach(row => {
                rowCount++;
                row.querySelector('.row-index').innerText = rowCount;
            });
        }

        function calculate() {
            let grandTotal = 0;
            const rows = document.querySelectorAll('#tableBody tr');
            
            rows.forEach((row) => {
                const price = parseFloat(row.querySelector('.unit-price').value) || 0;
                const qty = parseFloat(row.querySelector('.quantity').value) || 0;
                const total = price * qty;
                row.querySelector('.total-row').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
                grandTotal += total;
            });
            
            document.getElementById('finalSum').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function showNotify(msg) {
            const n = document.getElementById('notify');
            n.innerText = msg;
            n.classList.remove('hidden');
            setTimeout(() => n.classList.add('hidden'), 3000);
        }

        function saveData() {
            const com1 = document.getElementById('com1').value;
            const com2 = document.getElementById('com2').value;
            const com3 = document.getElementById('com3').value;

            if(!com1 || !com2 || !com3) {
                showNotify('กรุณากรอกชื่อคณะกรรมการให้ครบทุกช่อง');
                return;
            }

            const rows = [];
            document.querySelectorAll('#tableBody tr').forEach(row => {
                rows.push({
                    desc: row.querySelector('.item-desc').value,
                    price: row.querySelector('.unit-price').value,
                    qty: row.querySelector('.quantity').value
                });
            });
            const data = {
                rows,
                com1, com2, com3
            };
            localStorage.setItem('budgetData', JSON.stringify(data));
            showNotify('บันทึกข้อมูลเรียบร้อยแล้ว');
        }

        function exportToWord() {
            const com1 = document.getElementById('com1').value;
            const com2 = document.getElementById('com2').value;
            const com3 = document.getElementById('com3').value;

            if (!com1 || !com2 || !com3) {
                showNotify('กรุณากรอกชื่อคณะกรรมการให้ครบถ้วนก่อนดาวน์โหลด');
                return;
            }

            const rows = document.querySelectorAll('#tableBody tr');
            let tableRowsHTML = '';
            rows.forEach((row, index) => {
                const desc = row.querySelector('.item-desc').value;
                const price = row.querySelector('.unit-price').value;
                const qty = row.querySelector('.quantity').value;
                const total = row.querySelector('.total-row').innerText;
                
                tableRowsHTML += `
                    <tr>
                        <td style="border: 1px solid black; padding: 5px; text-align: center;">${index + 1}</td>
                        <td style="border: 1px solid black; padding: 5px; text-align: left;">${desc}</td>
                        <td style="border: 1px solid black; padding: 5px; text-align: left;">${price}</td>
                        <td style="border: 1px solid black; padding: 5px; text-align: left;">${qty}</td>
                        <td style="border: 1px solid black; padding: 5px; text-align: left;">${total}</td>
                    </tr>
                `;
            });

            const finalSum = document.getElementById('finalSum').innerText;

            const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Export</title>
                <style>
                    body { font-family: 'TH Sarabun New', sans-serif; font-size: 16pt; margin: 0; padding: 0; }
                    p { margin: 0; padding: 0; line-height: 1.2; }
                    table { border-collapse: collapse; width: 100%; }
                    th { border: 1px solid black; padding: 5px; text-align: center; }
                    td { border: 1px solid black; padding: 5px; }
                </style>
                </head>
                <body>
                    <h2 style="text-align:center; font-family: 'TH Sarabun New', sans-serif; font-size: 16pt;">รายละเอียดการเบิกงบประมาณ</h2>
                    <table>
                        <thead>
                            <tr style="background-color: #f3f4f6;">
                                <th style="text-align:center;">ที่</th>
                                <th style="text-align:center;">รายการ</th>
                                <th style="text-align:center;">ราคา/หน่วย</th>
                                <th style="text-align:center;">จำนวน</th>
                                <th style="text-align:center;">รวมเป็นเงิน</th>
                            </tr>
                        </thead>
                        <tbody>${tableRowsHTML}</tbody>
                        <tfoot>
                            <tr>
                                <td colspan="4" style="text-align:right; font-weight:bold;">รวมเป็นเงินทั้งสิ้น</td>
                                <td style="text-align:left; font-weight:bold;">${finalSum}</td>
                            </tr>
                        </tfoot>
                    </table>

                    <div style="margin-top:20px; font-family: 'TH Sarabun New', sans-serif; font-size: 16pt;">
                        <p><strong>คณะกรรมการตรวจรับ:</strong></p>
                        <p>1. ${com1} ประธานกรรมการ</p>
                        <p>2. ${com2} กรรมการ</p>
                        <p>3. ${com3} กรรมการ</p>
                    </div>

                    <div style="margin-top:30px; border-top:1px solid #000; padding-top:10px; font-family: 'TH Sarabun New', sans-serif; font-size: 16pt;">
                        <p><strong>รายการตรวจสอบจากงานพัสดุ</strong></p>
                        <p>รวมเสนอขอใช้งบ ................................................................ บาท</p>
                        <p>รวมใช้จ่ายจริง ................................................................ บาท</p>
                        <p>เกินจากการเสนอขอใช้ ..................................................... บาท</p>
                        <p>เหลือจากการเสนอขอใช้ .................................................... บาท</p>
                        <p style="margin-top:20px;">ลงชื่อ................................................... เจ้าหน้าที่งานพัสดุโรงเรียน</p>
                        <p>(...................................................)</p>
                    </div>
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'budget-report.doc';
            a.click();
        }
    </script>
</body>
</html>
